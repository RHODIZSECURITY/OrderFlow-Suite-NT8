name: Publish NT8 Package

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Sync source files to dist package
        run: |
          # Limpia los indicadores anteriores para que solo queden los actuales
          rm -f dist/NT8_Import_Package/Indicators/*.cs
          # Copia todos los indicadores .cs de la raiz
          cp *.cs dist/NT8_Import_Package/Indicators/
          # Copia los AddOns de soporte
          cp AddOns/SE.cs AddOns/OrderFlow-Suite.cs dist/NT8_Import_Package/AddOns/

      - name: Build versioned ZIP
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cd dist
          zip -rq "OrderFlow-Suite-NT8-v${VERSION}-Import.zip" NT8_Import_Package

      - name: Delete all previous releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          gh release list --repo ${{ github.repository }} --limit 100 --json tagName \
            | jq -r '.[].tagName' \
            | while read TAG; do
                if [ "$TAG" != "v${VERSION}" ]; then
                  echo "Deleting release: $TAG"
                  gh release delete "$TAG" --repo ${{ github.repository }} --yes --cleanup-tag 2>/dev/null || true
                fi
              done

      - name: Create / update versioned release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.VERSION }}
          name: "OrderFlow Suite NT8 v${{ steps.version.outputs.VERSION }}"
          allowUpdates: true
          makeLatest: true
          replacesArtifacts: true
          artifacts: "dist/OrderFlow-Suite-NT8-v${{ steps.version.outputs.VERSION }}-Import.zip"
          body: |
            ## OrderFlow Suite NT8 v${{ steps.version.outputs.VERSION }}

            ### Instalacion
            Descarga `OrderFlow-Suite-NT8-v${{ steps.version.outputs.VERSION }}-Import.zip` e importa en NinjaTrader:
            **Tools → Import NinjaScript Add-On**

            ### Indicadores incluidos (arquitectura modular)
            | Indicador | Contenido |
            |-----------|-----------|
            | **TrendSeries** | EMA Series (×4) + SMA Series (×5) + Bollinger Bands Pro |
            | **LevelsSuite** | Previous Day H/L · ORB Pro · NY Pre-Market · Session VWAP · Session Gap |
            | **SupportResistance** | Zonas S/R automaticas (Pivots / Donchian / CSID) |
            | **SmartMoneyConcepts** | Fair Value Gaps + Order Blocks |
            | **StructureSuite** | Market Structure (BOS/CHoCH) + Liquidity Suite + Premium/Discount Zones |
            | **OrderFlowSignals** | Big Trades + Triple-A (absorcion → acumulacion → agresion) |
            | **HeatMapFlow** | Profundidad de mercado y volumen por nivel de precio |
            | **VolumeProfile** | Order Flow + Market Volume + Volume Analysis Profile + Volume Filter |

            ### Requisito
            Activar **Tick Replay**: Tools → Options → Market Data → Show Tick Replay

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push GHCR package
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.package
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/orderflow-suite-nt8:latest
            ghcr.io/${{ github.repository_owner }}/orderflow-suite-nt8:v${{ steps.version.outputs.VERSION }}
