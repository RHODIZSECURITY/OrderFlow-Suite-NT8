name: Publish NT8 Import Package

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure ZIP packages are fresh
        run: |
          cd dist
          rm -f OrderFlow-Suite-NT8-Import.zip OrderFlow-Suite-NT8-SourceOnly.zip OrderFlow-Suite-NT8-Compat-Import.zip
          zip -rq OrderFlow-Suite-NT8-Import.zip NT8_Import_Package
          zip -rq OrderFlow-Suite-NT8-SourceOnly.zip SourceOnly
          cp OrderFlow-Suite-NT8-Import.zip OrderFlow-Suite-NT8-Compat-Import.zip

      - name: Delete previous release and tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "OrderFlow-Suite-NT8";
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.info(`Deleting existing release id=${release.data.id} tag=${tag}`);
              await github.rest.repos.deleteRelease({ owner, repo, release_id: release.data.id });
            } catch (error) {
              core.info(`No previous release found for tag ${tag}`);
            }

            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Deleted previous tag ${tag}`);
            } catch (error) {
              core.info(`No previous tag found for ${tag}`);
            }

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: OrderFlow-Suite-NT8
          name: OrderFlow-Suite-NT8
          allowUpdates: false
          makeLatest: true
          artifacts: "dist/OrderFlow-Suite-NT8-Import.zip,dist/OrderFlow-Suite-NT8-SourceOnly.zip,dist/OrderFlow-Suite-NT8-Compat-Import.zip"
          body: |
            Última versión lista para importar en NinjaTrader.

            Archivos incluidos:
            - OrderFlow-Suite-NT8-Import.zip (principal)
            - OrderFlow-Suite-NT8-SourceOnly.zip (recomendado si hay error de versión al importar)
            - OrderFlow-Suite-NT8-Compat-Import.zip (compatibilidad)

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push GHCR package (latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.package
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/orderflow-suite-nt8:latest
